# CI — Radar de Licitações
# Gates na ordem de A08 §6: install → build/typecheck → boundaries+lint → testes → stress → segurança A07 → scan de imagem
# Segredos via GitHub provider secrets; nenhum valor fixo no pipeline.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"

jobs:
  # ─── Gate 1: install ───────────────────────────────────────────────────────
  install:
    name: Instalar dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Salvar node_modules no cache
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ─── Gate 2: build + typecheck ─────────────────────────────────────────────
  build:
    name: Build + typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: turbo build
        run: pnpm build

      - name: turbo typecheck
        run: pnpm typecheck

  # ─── Gate 3: boundaries + lint ─────────────────────────────────────────────
  lint:
    name: Boundaries + lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: pnpm build (deps para boundaries)
        run: pnpm build

      - name: Verificar boundaries (dependency-cruiser)
        run: pnpm boundaries

      - name: turbo lint (ESLint custom rules)
        run: pnpm lint

  # ─── Gate 4: testes unitários + integração ─────────────────────────────────
  test:
    name: Testes unit + integração
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: pnpm build
        run: pnpm build

      - name: Testes unitários e de integração (excl. BDD — step defs pendentes)
        run: pnpm turbo test --filter=!@radar/bdd --filter=!@radar/e2e

      - name: Testes BDD (cucumber — informacional, não bloqueia até step defs prontos)
        continue-on-error: true
        run: pnpm --filter @radar/bdd test

  # ─── Gate 5: stress (A04/A05) — só em push para main ──────────────────────
  stress:
    name: Stress tests (A04/A05)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: radar
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: pnpm build
        run: pnpm build

      - name: Testes de stress (k6)
        env:
          DATABASE_URL: postgresql://radar:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/radar_test
        run: |
          if [ -f "tests/stress/package.json" ]; then
            pnpm --filter @radar/stress test
          else
            echo "Stress tests ainda não configurados — pulando"
          fi

  # ─── Gate 6: segurança A07 (SAST) — crítico/alto BLOQUEIA (P-63) ──────────
  security:
    name: Gate segurança A07 (Trivy SAST)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — SAST filesystem (crítico+alto bloqueia)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-sast.sarif
        continue-on-error: false

      - name: Upload SARIF para GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sast.sarif

  # ─── Gate 7: scan de imagem (P-56) — só em push para main ─────────────────
  image-scan:
    name: Scan de imagem Docker (P-56)
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem api (se Dockerfile existir)
        run: |
          if [ -f "apps/api/Dockerfile" ]; then
            docker build -t radar/api:ci apps/api/
          else
            echo "Dockerfile não encontrado em apps/api — pulando build"
            touch /tmp/skip-image-scan
          fi

      - name: Trivy — scan de imagem
        if: ${{ !hashFiles('/tmp/skip-image-scan') }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: radar/api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF imagem
        if: always() && hashFiles('trivy-image.sarif')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

  # ─── Gate 8: Terraform validate (P-65) ────────────────────────────────────
  # Scaffold presente; plan/apply bloqueados até conta AWS provisionada.
  # -backend=false executa localmente sem backend S3 (conta inexistente).
  # Quando a conta existir: remover -backend=false e configurar AWS_* secrets.
  terraform-validate:
    name: Terraform Validate (P-65)
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        stack: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init (${{ matrix.stack }}) — sem backend
        working-directory: infra/terraform/stacks/${{ matrix.stack }}
        run: terraform init -backend=false

      - name: Terraform Validate (${{ matrix.stack }})
        working-directory: infra/terraform/stacks/${{ matrix.stack }}
        run: terraform validate
