# CI — Radar de Licitações
# Gates na ordem de A08 §6: install → build/typecheck → boundaries+lint → testes → stress → segurança A07 → scan de imagem
# Segredos via GitHub provider secrets; nenhum valor fixo no pipeline.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"

jobs:
  # ─── Gate 1: install ───────────────────────────────────────────────────────
  install:
    name: Instalar dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Salvar node_modules no cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ─── Gate 2: build + typecheck ─────────────────────────────────────────────
  build:
    name: Build + typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: turbo build
        run: pnpm build

      - name: turbo typecheck
        run: pnpm typecheck

  # ─── Gate 3: boundaries + lint ─────────────────────────────────────────────
  lint:
    name: Boundaries + lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: pnpm build (deps para boundaries)
        run: pnpm build

      - name: Verificar boundaries (dependency-cruiser)
        run: pnpm boundaries

      - name: turbo lint (ESLint custom rules)
        run: pnpm lint

  # ─── Gate 4: testes unitários + integração ─────────────────────────────────
  test:
    name: Testes unit + integração
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: pnpm build
        run: pnpm build

      - name: Testes unitários e de integração (excl. BDD e E2E — Testcontainers em steps dedicados)
        run: pnpm turbo test --filter=!@radar/bdd --filter=!@radar/e2e --filter=!@radar/security-gates

      - name: Gate AB1/AB10/AB13/AB14 — segurança A07 (P-51/P-62)
        run: pnpm --filter @radar/security-gates test

      - name: Testes BDD (cucumber — 21 cenários, bloqueante)
        run: pnpm --filter @radar/bdd test

  # ─── Gate 5: stress (A04/A05) — só em push para main ──────────────────────
  stress:
    name: Stress tests (A04/A05)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: radar
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restaurar node_modules
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            modules/*/node_modules
            shared/*/node_modules
            tests/*/node_modules
            tools/*/node_modules
          key: node_modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: pnpm build
        run: pnpm build

      - name: Testes de stress do banco (A04/A05)
        env:
          DATABASE_URL: postgresql://radar:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/radar_test
        run: pnpm --filter @radar/db-stress test

  # ─── Gate 6: segurança A07 — crítico/alto BLOQUEIA (P-56/P-63) ────────────
  security:
    name: Gate segurança A07 (AppSec)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Gitleaks — secret scanning (bloqueante)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep — SAST Radar + OWASP (bloqueante)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            .semgrep.yml
            p/owasp-top-ten
            p/secrets
          generateSarif: "1"

      - name: Upload SARIF Semgrep
        if: always() && hashFiles('semgrep.sarif')
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: semgrep.sarif

      - name: Trivy — SCA filesystem (crítico+alto bloqueia) — debug
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "0"
          format: table
        continue-on-error: true

      - name: Trivy — SCA filesystem (crítico+alto bloqueia)
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-fs.sarif
        continue-on-error: false


      - name: Upload SARIF Trivy FS
        if: always()
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Trivy — gerar SBOM CycloneDX
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json

      - name: Publicar SBOM como artefato
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error

      - name: OWASP ZAP baseline (DAST quando houver alvo)
        if: ${{ vars.DAST_TARGET_URL != '' }}
        uses: zaproxy/action-baseline@7c4deb10e6261301961c86d65d54a516394f9aed # v0.14.0
        with:
          target: ${{ vars.DAST_TARGET_URL }}
          fail_action: true
          allow_issue_writing: false

  # ─── Gate 7: scan de imagem (P-56) — PR e push para main ──────────────────
  image-scan:
    name: Scan de imagem Docker (P-56)
    runs-on: ubuntu-latest
    needs: security
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build imagem api (se Dockerfile existir)
        id: build_image
        run: |
          if [ -f "apps/api/Dockerfile" ]; then
            docker build -f apps/api/Dockerfile -t radar/api:ci .
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Dockerfile não encontrado em apps/api — pulando build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trivy — scan de imagem
        if: steps.build_image.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          image-ref: radar/api:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF imagem
        if: always() && hashFiles('trivy-image.sarif')
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-image.sarif

  # ─── Gate 8: Terraform validate (P-65) ────────────────────────────────────
  # Scaffold presente; plan/apply bloqueados até conta AWS provisionada.
  # -backend=false executa localmente sem backend S3 (conta inexistente).
  # Quando a conta existir: remover -backend=false e configurar AWS_* secrets.
  terraform-validate:
    name: Terraform Validate (P-65)
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        stack: [dev, staging, prod]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init (${{ matrix.stack }}) — sem backend
        working-directory: infra/terraform/stacks/${{ matrix.stack }}
        run: terraform init -backend=false

      - name: Terraform Validate (${{ matrix.stack }})
        working-directory: infra/terraform/stacks/${{ matrix.stack }}
        run: terraform validate
